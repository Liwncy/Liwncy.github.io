<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OnePage</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="icon" href="/main/favicon.ico">
    <title>CSS3西游记师徒取经场景动画</title>
    <style type="text/css">
        * {
            padding: 0;
            margin: 0;
            list-style: none;
        }
        html,body {
            height: 100%;
        }
        .main {
            height: 100%;
            width: 100%;
            -webkit-background-size: cover;
            background-size: cover;
            overflow: hidden;
            position: relative;
        }
        .main ul {
            height: 100%;
            width: 3920px;
            position: absolute;
            top: 0;
            left: 0;
            animation: dong 50s linear infinite;
        }
        @keyframes dong {
            0% {
                left: 0;
            }
            100% {
                left: 1920px;
            }
        }
        .main ul li {
            height: 100%;
            width: 100%;
            background: url(/main/static/img/2.jpg);
            float: left;
            margin-left: -2000px;
        }
        .wk {
            z-index: 999;
            width: 200px;
            height: 180px;
            background: url(/main/static/img/west_01_3ca39fe.png) 0 0 no-repeat;
            /*margin: 400px auto;*/
            position: absolute;
            top: 55%;
            left: 20%;
            animation: wkzou 1s steps(8) infinite;
        }
        @keyframes wkzou {
            to {
                background-position: -1600px 0;
            }
        }
        .bj {
            z-index: 999;
            width: 200px;
            height: 180px;
            background: url(/main/static/img/west_02_47bad19.png) 0 0 no-repeat;
            /*margin: 400px auto;*/
            position: absolute;
            top: 55%;
            left: 35%;
            animation: bjzou 1s steps(8) infinite;
        }
        @keyframes bjzou {
            to {
                background-position: -1600px 0;
            }
        }
        .ts {
            z-index: 999;
            width: 170px;
            height: 240px;
            background: url(/main/static/img/west_03_f962447.png) 0 0 no-repeat;
            /*margin: 400px auto;*/
            position: absolute;
            top: 50%;
            left: 50%;
            animation: tszou 1s steps(8) infinite;
        }
        @keyframes tszou {
            to {
                background-position: -1360px 0;
            }
        }
        .ss {
            z-index: 999;
            width: 210px;
            height: 200px;
            background: url(/main/static/img/west_04_6516d80.png) 0 0 no-repeat;
            /*margin: 400px auto;*/
            position: absolute;
            top: 57%;
            left: 62%;
            animation: sszou 1s steps(8) infinite;
        }
        @keyframes sszou {
            to {
                background-position: -1680px 0;
            }
        }
        /*设置标题*/
        .title {
            z-index: 999;
            width: 650px;
            height: 200px;
            /*background: url(main/static/img/west_04_6516d80.png) 0 0 no-repeat;*/
            /*margin: 400px auto;*/
            position: absolute;
            top: 5%;
            left: 30%;
            /*animation: tzou 1s steps(8) infinite;*/
        }
        /*@keyframes tzou {*/
        /*to {*/
        /*background-position: -1500px 0;*/
        /*}*/
        /*}*/
    </style>
<body>
<div class="title"><h1>Welcome to Liwncy's github page!</h1></div>
<div class="wk"></div>
<div class="bj"></div>
<div class="ts"></div>
<div class="ss"></div>
<div class="main">
    <ul>
        <li>
            <div>
                <h1></h1>
            </div>
        </li>
        <li>
            <div>
                <h1></h1>
            </div>
        </li>
    </ul>
</div>
</body>
</html>
